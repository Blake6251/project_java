# EC2 + RDS(MySQL 8) ???댁쁺 ?섍꼍 ???섍꼍蹂?섎줈 二쇱엯
spring:
  datasource:
    # RDS??蹂댄넻 SSL 沅뚯옣 ???꾩슂 ??&useSSL=true&requireSSL=true ??異붽?
    url: jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT:3306}/${RDS_DB_NAME:portal_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: INFO
    com.project.portal: INFO
