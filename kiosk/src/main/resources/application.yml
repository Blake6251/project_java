spring:
  application:
    name: kiosk
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/kiosk_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1313}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-that-is-at-least-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
    redis:
      enabled: false

file:
  upload:
    path: ${FILE_UPLOAD_PATH:uploads}

# Rate Limit (테스트는 application-test.yml 에서 비활성화)
app:
  ratelimit:
    enabled: true
    api-requests-per-minute: 60
    login-max-failures: 5
    login-block-seconds: 600
    login-failure-window-seconds: 900

